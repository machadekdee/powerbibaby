<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNI Logistics Data Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #0ff;
            --magenta: #f0f;
            --bg: #050505;
            --grid: rgba(0, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }

        /* --- เอฟเฟกต์หน้าจอ CRT และ Scanlines --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 9999;
        }

        /* --- พื้นหลังกริดเคลื่อนไหว --- */
        .cyber-grid {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(0);
            transform-origin: center;
            animation: gridMove 20s linear infinite;
            z-index: 0;
            perspective: 1000px;
        }

        @keyframes gridMove {
            100% { transform: rotateX(60deg) translateY(500px); }
        }

        /* --- หน้าจอ Boot Sequence --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px; box-sizing: border-box;
            transition: opacity 1s ease-out; /* อนิเมชันเฟดออก */
            cursor: pointer; /* บอกให้รู้ว่ากดได้ */
        }
        .boot-text { font-size: 1.2rem; margin: 5px 0; text-shadow: 0 0 5px var(--cyan); }
        .skip-hint { position: absolute; top: 20px; right: 20px; color: #555; font-size: 0.9rem; animation: blink 2s infinite;}
        
        /* --- เมนบอร์ด UI --- */
        #main-ui {
            position: relative; z-index: 10;
            display: none; height: 100%; opacity: 0; 
            transition: opacity 1.5s ease-in; /* อนิเมชันเฟดเข้า */
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- HUD ด้านบน --- */
        .top-hud {
            position: absolute; top: 20px; width: 95%;
            display: flex; justify-content: space-between;
            border-bottom: 2px solid var(--cyan);
            padding-bottom: 10px; text-shadow: 0 0 10px var(--cyan);
        }

        /* --- HUD สถิติด้านข้าง --- */
        .side-stats {
            position: absolute; left: 20px; top: 100px;
            width: 200px; border-left: 2px solid var(--magenta);
            padding-left: 15px; color: var(--magenta);
            text-shadow: 0 0 10px var(--magenta);
        }
        .stat-bar { height: 10px; background: rgba(255,0,255,0.2); margin: 5px 0 15px 0; position: relative; }
        .stat-fill { height: 100%; background: var(--magenta); width: 0%; transition: width 0.5s ease; }

        /* --- หัวข้อหลัก --- */
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 4rem;
            margin: 0 0 40px 0; text-align: center;
            background: linear-gradient(90deg, var(--cyan), #fff, var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0,255,255,0.5));
            animation: glitch 4s infinite;
        }

        /* --- การ์ดปุ่มกด --- */
        .card-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1200px; }

        .cyber-card {
            width: 260px; height: 180px;
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
            transition: all 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .cyber-card::before { content: ''; position: absolute; top: 0; left: 0; width: 10px; height: 10px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
        .cyber-card::after { content: ''; position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-bottom: 2px solid var(--magenta); border-right: 2px solid var(--magenta); }

        /* ให้ปุ่มเด้งขึ้นและขยายขนาดเมื่อเอาเมาส์ชี้ แทนการใช้สคริปต์ 3D ที่มักจะบัค */
        .cyber-card:hover { 
            background: rgba(0, 255, 255, 0.1); 
            border-color: var(--cyan); 
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); 
            transform: scale(1.08) translateY(-10px); 
        }

        .card-icon { font-size: 3.5rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--cyan)); }
        .card-title { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; }
        .card-sub { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* --- หน้าต่าง QR Code ถอดรหัส --- */
        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            align-items: center; justify-content: center; flex-direction: column;
            opacity: 0; transition: opacity 0.5s ease;
        }
        
        .qr-frame {
            padding: 20px; border: 2px solid var(--cyan);
            background: repeating-linear-gradient(45deg, rgba(0,255,255,0.05) 0px, rgba(0,255,255,0.05) 10px, transparent 10px, transparent 20px);
            position: relative; display: inline-block;
        }

        .qr-frame img { width: 250px; height: 250px; opacity: 0; filter: contrast(150%) brightness(120%); transition: opacity 1.5s ease-out; }

        .decrypt-text { font-size: 1.5rem; margin-top: 20px; color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }

        .close-btn { margin-top: 30px; padding: 10px 30px; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; transition: 0.3s; }
        .close-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0;} }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="cyber-grid"></div>

    <div id="boot-screen" onclick="skipBoot()">
        <div class="skip-hint">[CLICK ANYWHERE TO SKIP]</div>
        <div id="boot-terminal"></div>
    </div>

    <div id="main-ui">
        <div class="top-hud">
            <div>SYS.ID: TNI-SECURE-NODE // LOGISTICS_DATA_ANALYSIS</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="side-stats">
            <div>CPU_LOAD</div>
            <div class="stat-bar"><div class="stat-fill" id="cpu-bar"></div></div>
            <div>NET_UPLINK</div>
            <div class="stat-bar"><div class="stat-fill" id="net-bar"></div></div>
            <div>MEM_USAGE</div>
            <div class="stat-bar"><div class="stat-fill" id="mem-bar"></div></div>
        </div>

        <h1>DATA ANALYSIS BY BEST FEW PEE</h1>

        <div class="card-container">
            <a href="https://app.powerbi.com/links/shZ4-Z4P5k?ctid=b2a7ec06-37f5-4fbd-8743-1da4a6adddf4&pbi_source=linkShare" target="_blank" class="cyber-card">
                <div class="card-icon">🌐</div>
                <div class="card-title">LIVE_LINK</div>
                <div class="card-sub">Dashboard ON WEB</div>
            </a>

            <div class="cyber-card" onclick="startDecrypt()">
                <div class="card-icon">📱</div>
                <div class="card-title">HOLO_SYNC</div>
                <div class="card-sub">QR Access Protocol</div>
            </div>

            <a href="https://www.dropbox.com/t/xSLrx7GHZSgSxodD" target="_blank" class="cyber-card" style="--cyan: #f0f; border-color: rgba(255,0,255,0.3);">
                <div class="card-icon">📑</div>
                <div class="card-title">OFFLINE SUMMARY</div>
                <div class="card-sub">Download PDF</div>
            </a>

            <a href="https://drive.google.com/file/d/1LFdHyAPlKhEYZ8SnRtvz7bm-odE6T1Nu/view?usp=sharing" target="_blank" class="cyber-card">
                <div class="card-icon">⚙️</div>
                <div class="card-title">MY HEART STERIO</div>
                <div class="card-sub">Extract .pbix File</div>
            </a>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-frame">
            <img src="https://i.postimg.cc/9FPzzCJm/Untitled.png" id="qr-image" alt="QR Code">
        </div>
        <div class="decrypt-text" id="decrypt-display">DECRYPTING...</div>
        <button class="close-btn" onclick="closeModal()">CLOSE QR SCANNER</button>
    </div>

    <script>
        // --- 1. ระบบ Boot Sequence จำลอง (Pure JS แก้บัคค้าง 100%) ---
        const bootText = [
            "INITIALIZING KERNEL...",
            "BYPASSING SECURITY PROTOCOLS...",
            "CONNECTING TO TNI SECURE NETWORK... [SUCCESS]",
            "ACCESSING LOGISTICS DATABASES...",
            "LOADING VISUALIZATION MODULES...",
            "AUTHENTICATING USER: PROFESSOR...",
            "ACCESS GRANTED. WELCOME TO THE SYSTEM."
        ];
        
        let bootContainer = document.getElementById('boot-terminal');
        let bootDelay = 0;
        let isBooting = true;
        let bootTimeouts = []; // เก็บตัวตั้งเวลาไว้เผื่อกดยกเลิก

        // ฟังก์ชันหัวใจสำคัญ: ปิดหน้าแฮก แล้วเปิดหน้าหลัก
        function showMainUI() {
            if(!isBooting) return;
            isBooting = false;
            
            // ยกเลิกการพิมพ์ข้อความที่เหลือทั้งหมดถ้ากดข้าม
            bootTimeouts.forEach(clearTimeout);

            let bootScreen = document.getElementById('boot-screen');
            let mainUi = document.getElementById('main-ui');

            bootScreen.style.opacity = '0'; // เฟดหน้าจอดำออก
            
            setTimeout(() => {
                bootScreen.style.display = 'none'; // ซ่อนหน้าจอดำทิ้ง
                mainUi.style.display = 'flex'; // โชว์หน้าหลักขึ้นมา
                setTimeout(() => {
                    mainUi.style.opacity = '1'; // ค่อยๆ สว่างขึ้น
                }, 50);
            }, 1000); // รอ 1 วินาทีให้เฟดจางลงก่อน
        }

        // ฟังก์ชันสำหรับเอาไว้กดข้าม (Skip)
        function skipBoot() {
            showMainUI();
        }

        // รันข้อความ Boot แฮกเกอร์
        bootText.forEach((text, index) => {
            let timeout = setTimeout(() => {
                if(!isBooting) return;
                let p = document.createElement('div');
                p.className = 'boot-text';
                p.innerText = "> " + text;
                bootContainer.appendChild(p);
                
                // ถ้าเป็นข้อความบรรทัดสุดท้าย ให้เรียกฟังก์ชันเข้าหน้าหลัก
                if(index === bootText.length - 1) {
                    setTimeout(showMainUI, 1200); 
                }
            }, bootDelay);
            bootTimeouts.push(timeout);
            bootDelay += Math.random() * 400 + 300; // สุ่มเวลาพิมพ์
        });

        // --- 2. นาฬิกาแบบ Real-time ---
        setInterval(() => {
            let date = new Date();
            document.getElementById('clock').innerText = date.toLocaleTimeString('en-US', {hour12: false}) + ":" + date.getMilliseconds().toString().padStart(3, '0');
        }, 50);

        // --- 3. จำลองกราฟสถิติวิ่งไปมา ---
        setInterval(() => {
            document.getElementById('cpu-bar').style.width = Math.random() * 100 + "%";
            document.getElementById('net-bar').style.width = Math.random() * 100 + "%";
            document.getElementById('mem-bar').style.width = Math.random() * 60 + 40 + "%";
        }, 1500);

        // --- 4. ระบบถอดรหัส QR Code ---
        let decryptInterval;
        function startDecrypt() {
            let modal = document.getElementById('qr-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 10);

            let decryptDisplay = document.getElementById('decrypt-display');
            let qrImg = document.getElementById('qr-image');
            qrImg.style.opacity = '0'; // ซ่อนรูปไว้ก่อน
            
            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            let iteration = 0;
            let targetText = "SYNC_COMPLETE";

            clearInterval(decryptInterval);
            decryptInterval = setInterval(() => {
                decryptDisplay.innerText = targetText.split("").map((letter, index) => {
                    if(index < iteration) return targetText[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
                
                if(iteration >= targetText.length) {
                    clearInterval(decryptInterval);
                    qrImg.style.opacity = '1'; // ถอดรหัสเสร็จ ค่อยโชว์รูป QR
                }
                iteration += 1 / 3;
            }, 30);
        }

        function closeModal() {
            let modal = document.getElementById('qr-modal');
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 500);
            document.getElementById('qr-image').style.opacity = '0';
            clearInterval(decryptInterval);
        }
    </script>
</body>
</html>
